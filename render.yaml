services:
  - type: web
    name: invoiceflow
    runtime: python3.13
    plan: standard
    buildCommand: bash build.sh
    startCommand: gunicorn invoiceflow.wsgi -c gunicorn.conf.py
    envVars:
      - key: PRODUCTION
        value: "true"
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.13.4"
      # Database is auto-connected via Render
      - key: DATABASE_URL
        fromService:
          name: invoiceflow-db
          property: connectionString
      # Secret variables - set these in Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_SALT
        sync: false
      - key: HCAPTCHA_SITEKEY
        sync: false
      - key: HCAPTCHA_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

databases:
  - name: invoiceflow-db
    engine: postgres
    version: "15"
    plan: starter
    initialDatabase: invoiceflow_prod
