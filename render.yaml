services:
  - type: web
    name: invoiceflow
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn invoiceflow.wsgi:application -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PRODUCTION
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_SALT
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: invoiceflow-db
          property: connectionString
      - key: SITE_URL
        value: "https://invoiceflow.com.ng"
      - key: ALLOWED_HOSTS
        value: "invoiceflow.com.ng,www.invoiceflow.com.ng,invoice-flow-7vu0.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://invoiceflow.com.ng,https://www.invoiceflow.com.ng,https://invoice-flow-7vu0.onrender.com"
      - key: GUNICORN_GRACEFUL_TIMEOUT
        value: "10"
    healthCheckPath: /health/live/
    autoDeploy: true
    plan: starter

databases:
  - name: invoiceflow-db
    plan: starter
    databaseName: invoiceflow
    postgresMajorVersion: 15
