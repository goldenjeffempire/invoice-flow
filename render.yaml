services:
  - type: web
    name: invoiceflow
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn invoiceflow.wsgi:application -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PRODUCTION
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_SALT
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: invoiceflow-db
          property: connectionString
      - key: SITE_URL
        value: "https://invoiceflow.com.ng"
      - key: ALLOWED_HOSTS
        value: "invoiceflow.onrender.com,invoiceflow.com.ng,www.invoiceflow.com.ng"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://invoiceflow.onrender.com,https://invoiceflow.com.ng,https://www.invoiceflow.com.ng"
      - key: DJANGO_SETTINGS_MODULE
        value: "invoiceflow.settings"
      - key: GUNICORN_GRACEFUL_TIMEOUT
        value: "30"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: GUNICORN_THREADS
        value: "4"
      - key: GUNICORN_WORKER_CLASS
        value: "gthread"
      - key: GUNICORN_LOG_LEVEL
        value: "info"
      - key: EMAIL_HOST
        value: "smtp.sendgrid.net"
      - key: EMAIL_HOST_USER
        value: "apikey"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: DEFAULT_FROM_EMAIL
        value: "Invoice Flow <noreply@invoiceflow.com.ng>"
    healthCheckPath: /health/live/
    autoDeploy: true
    plan: starter
    numInstances: 1
    region: oregon
    preDeployCommand: python manage.py check --deploy

databases:
  - name: invoiceflow-db
    plan: starter
    databaseName: invoiceflow
    postgresMajorVersion: 16
    ipAllowList: []
