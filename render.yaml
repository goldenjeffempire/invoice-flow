# InvoiceFlow – Production Deployment Blueprint (Render)
# https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────────────────────
# DEPLOYMENT NOTES
# ─────────────────────────────────────────────────────────────────────────────
# This file provisions the entire InvoiceFlow infrastructure on Render.
#
# Always On: All paid Render plans (starter and above) NEVER sleep.
#            "standard" plan is used here for production memory headroom.
#
# Deploy order:
#   1. buildCommand   → install deps + collectstatic (no migrations here)
#   2. preDeployCommand → run migrations (zero-downtime, before new instance)
#   3. startCommand   → launch Gunicorn
#
# Secrets to add via Render Dashboard → Environment (NOT committed to git):
#   SENDGRID_API_KEY, PAYSTACK_SECRET_KEY, SENTRY_DSN, REDIS_URL
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Web Service ─────────────────────────────────────────────────────────────
  - type: web
    name: invoiceflow-web
    runtime: python
    region: oregon
    plan: standard        # 2 GB RAM / 1 CPU – Always On, never sleeps

    buildCommand: "./build.sh"
    startCommand: "gunicorn invoiceflow.wsgi:application -c gunicorn.conf.py"

    # Zero-downtime migrations: run right before the new instance goes live.
    # The old instance keeps serving traffic while this command executes.
    preDeployCommand: "python manage.py migrate --noinput && python manage.py check --deploy"

    autoDeploy: true
    pullRequestPreviewsEnabled: false   # Disable PR previews for security

    # Number of instances (horizontal scaling – increase for high traffic)
    numInstances: 1

    # Render health check – must return 200 within 30 s on startup
    healthCheckPath: /health/live/

    # Maximum time Render waits for the old instance to finish requests
    # before forceful shutdown during deploys
    maxShutdownDelaySeconds: 30

    envVars:
      # ── Runtime ─────────────────────────────────────────────────────────
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PRODUCTION
        value: "true"
      - key: DEBUG
        value: "false"
      - key: DJANGO_SETTINGS_MODULE
        value: "invoiceflow.settings"
      - key: PORT
        value: "10000"          # Render's internal port for web services

      # ── Security (auto-generated by Render – never committed to git) ─────
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_SALT
        generateValue: true

      # ── Database (auto-linked from invoiceflow-db below) ─────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: invoiceflow-db
          property: connectionString

      # ── Networking / CORS / CSRF ──────────────────────────────────────────
      - key: SITE_URL
        value: "https://invoiceflow.com.ng"
      - key: ALLOWED_HOSTS
        value: "invoiceflow-web.onrender.com,invoiceflow.com.ng,www.invoiceflow.com.ng"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://invoiceflow-web.onrender.com,https://invoiceflow.com.ng,https://www.invoiceflow.com.ng"

      # ── Gunicorn Worker Tuning ────────────────────────────────────────────
      # standard plan: 1 CPU / 2 GB RAM → 3 gthread workers × 4 threads = 12 concurrent
      - key: WEB_CONCURRENCY
        value: "3"
      - key: GUNICORN_THREADS
        value: "4"
      - key: GUNICORN_WORKER_CLASS
        value: "gthread"
      - key: GUNICORN_GRACEFUL_TIMEOUT
        value: "30"
      - key: GUNICORN_MAX_REQUESTS
        value: "1000"
      - key: GUNICORN_MAX_REQUESTS_JITTER
        value: "100"
      - key: GUNICORN_LOG_LEVEL
        value: "info"

      # ── Email (SendGrid SMTP) ─────────────────────────────────────────────
      - key: EMAIL_HOST
        value: "smtp.sendgrid.net"
      - key: EMAIL_HOST_USER
        value: "apikey"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: DEFAULT_FROM_EMAIL
        value: "InvoiceFlow <noreply@invoiceflow.com.ng>"
      - key: SERVER_EMAIL
        value: "errors@invoiceflow.com.ng"

      # ── Rate Limiting ─────────────────────────────────────────────────────
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW
        value: "60"

      # ── Account Security ──────────────────────────────────────────────────
      - key: ACCOUNT_LOCKOUT_THRESHOLD
        value: "5"
      - key: ACCOUNT_LOCKOUT_DURATION
        value: "900"

      # ── App Metadata ──────────────────────────────────────────────────────
      - key: APP_VERSION
        value: "1.0.0"

      # ── Secrets (set via Render Dashboard – NOT auto-synced from git) ─────
      - key: SENDGRID_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false              # Optional: link Render Redis add-on URL here
      - key: SENTRY_DSN
        sync: false              # Optional: paste Sentry DSN from Sentry dashboard

  # ── Background Worker (Celery-style via management command) ─────────────────
  # Uncomment when you add Celery:
  #
  # - type: worker
  #   name: invoiceflow-worker
  #   runtime: python
  #   region: oregon
  #   plan: starter
  #   buildCommand: "pip install -r requirements.txt"
  #   startCommand: "celery -A invoiceflow worker --loglevel=info --concurrency=2"
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: invoiceflow-db
  #         property: connectionString
  #     - key: REDIS_URL
  #       sync: false

# ── Managed PostgreSQL ─────────────────────────────────────────────────────────
databases:
  - name: invoiceflow-db
    databaseName: invoiceflow
    region: oregon
    plan: standard          # 4 GB storage / 1 GB RAM – production-grade
    postgresMajorVersion: 16
    ipAllowList: []         # Internal access only (Render private network)
