{% extends 'base/layout-authenticated.html' %}
{% block title %}Create Invoice | InvoiceFlow{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-slate-900 mb-8">Create New Invoice</h1>
    <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Client Name</label>
                <input type="text" name="client_name" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Total Amount ($)</label>
                <input type="number" step="0.01" name="total" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Generate Invoice</button>
        </form>
    </div>
</div>
{% endblock %}
