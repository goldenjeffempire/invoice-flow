{% load static %}
<footer class="dashboard-footer-modern" role="contentinfo">

                <a href="{% url 'dashboard' %}" class="footer-brand">
                    <div class="footer-brand-icon">

                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>

                    <span class="footer-brand-text">InvoiceFlow</span>

            </div>
            
            <nav class="footer-nav" aria-label="Footer navigation">
                <a href="{% url 'privacy' %}" class="footer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    Privacy
                </a>
                <a href="{% url 'terms' %}" class="footer-link">

                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    Terms
                </a>
                <a href="{% url 'contact' %}" class="footer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Support
                </a>
                <a href="{% url 'api' %}" class="footer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 18 22 12 16 6"/>
                        <polyline points="8 6 2 12 8 18"/>
                    </svg>
                    API
                </a>
            </nav>
        </div>
        
        <div class="footer-bottom">
            <div class="footer-copyright">
                <p>&copy; {% now "Y" %} InvoiceFlow. All rights reserved.</p>
                <span class="footer-divider"></span>
                <p class="footer-credit">
                    Built with <span class="footer-heart" aria-label="love">&#10084;</span> by
                    <a href="https://onome-portfolio-ten.vercel.app" target="_blank" rel="noopener noreferrer">Jeffery Onome Emuodafevware</a>
                </p>

            <div class="footer-status">
                <span class="footer-status-indicator"></span>
                <span>All systems operational</span>
            </div>
        </div>

</footer>

<style>
.dashboard-footer-modern {
    background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    border-top: 1px solid #e2e8f0;
    padding: 28px 24px 20px;
    margin-top: auto;
}

.footer-inner {
    max-width: 1400px;
    margin: 0 auto;
}

.footer-main {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e2e8f0;
}

.footer-brand-section {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
}

.footer-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    transition: opacity 0.2s ease;
}

.footer-brand:hover {
    opacity: 0.8;
}

.footer-brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.footer-brand-icon svg {
    width: 18px;
    height: 18px;
    color: white;
}

.footer-brand-text {
    font-size: 1.0625rem;
    font-weight: 700;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.footer-tagline {
    font-size: 0.8125rem;
    color: #64748b;
    margin: 0;
    padding-left: 14px;
    border-left: 1px solid #e2e8f0;
}

.footer-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.footer-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    font-size: 0.8125rem;
    font-weight: 500;
    color: #475569;
    text-decoration: none;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    transition: all 0.2s ease;
}

.footer-link:hover {
    color: #6366f1;
    border-color: #6366f1;
    background: #eef2ff;
    transform: translateY(-1px);
}

.footer-link svg {
    width: 14px;
    height: 14px;
}

.footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    padding-top: 16px;
}

.footer-copyright {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.footer-copyright p {
    margin: 0;
    font-size: 0.75rem;
    color: #64748b;
}

.footer-divider {
    width: 1px;
    height: 14px;
    background: #e2e8f0;
}

.footer-credit a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s ease;
}

.footer-credit a:hover {
    color: #4f46e5;
    text-decoration: underline;
}

.footer-heart {
    color: #ef4444;
    display: inline-block;
    animation: heartbeat 1.5s ease-in-out infinite;
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

.footer-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    color: #166534;
}

.footer-status-indicator {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse-status 2s ease-in-out infinite;
}

@keyframes pulse-status {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
}

@media (max-width: 768px) {
    .dashboard-footer-modern {
        padding: 24px 16px 16px;
    }
    
    .footer-main {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
    }
    
    .footer-brand-section {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }
    
    .footer-tagline {
        padding-left: 0;
        border-left: none;
    }
    
    .footer-nav {
        width: 100%;
    }
    
    .footer-link {
        padding: 6px 12px;
        font-size: 0.75rem;
    }
    
    .footer-bottom {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
    }
    
    .footer-copyright {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
    }
    
    .footer-divider {
        display: none;
    }
}

@media (max-width: 480px) {
    .footer-link svg {
        display: none;
    }
}
</style>
