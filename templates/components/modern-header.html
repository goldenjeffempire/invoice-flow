<!-- Modern Page Header Component -->
<div class="page-header-modern">
    <div class="page-header-content">
        <h1 class="page-title">{{ page_title }}</h1>
        {% if page_subtitle %}<p class="page-subtitle">{{ page_subtitle }}</p>{% endif %}
    </div>
    {% if page_actions %}
    <div class="page-actions">
        {% for action in page_actions %}
        <a href="{{ action.url }}" class="btn btn-{{ action.style|default:'primary' }}">
            {% if action.icon %}<span class="icon">{{ action.icon }}</span>{% endif %}
            {{ action.label }}
        </a>
        {% endfor %}
    </div>
    {% endif %}
</div>
