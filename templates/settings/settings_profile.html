{% extends "settings/settings_base.html" %}
{% block nav %}{% endblock %}
{% block settings_title %}Profile Settings{% endblock %}
{% block settings_content %}
<form method="POST">
    {% csrf_token %}
    <div class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="form-light-group">
                <label class="form-light-label">First Name</label>
                {{ form.first_name }}
            </div>
            <div class="form-light-group">
                <label class="form-light-label">Last Name</label>
                {{ form.last_name }}
            </div>
        </div>
        <div class="form-light-group">
            <label class="form-light-label">Email Address</label>
            {{ form.email }}
        </div>
        <button type="submit" class="btn-light-primary">Save Changes</button>
    </div>
</form>
{% endblock %}
