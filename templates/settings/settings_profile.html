{% extends 'settings/settings_base.html' %}

{% block settings_content %}
<h2 class="text-xl font-semibold mb-6">Profile Information</h2>
<form method="post" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            {{ user_form.first_name }}
            {{ user_form.first_name.errors }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            {{ user_form.last_name }}
            {{ user_form.last_name.errors }}
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        {{ user_form.email }}
        {{ user_form.email.errors }}
    </div>
    <div class="pt-4">
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors">Save Changes</button>
    </div>
</form>
{% endblock %}
