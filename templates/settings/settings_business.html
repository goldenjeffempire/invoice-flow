{% extends 'settings/settings_base.html' %}

{% block settings_content %}
<h2 class="text-xl font-semibold mb-6">Business Configuration</h2>
<form method="post" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
            {{ form.company_name }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Business Email</label>
            {{ form.business_email }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Business Phone</label>
            {{ form.business_phone }}
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Business Address</label>
            {{ form.business_address }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Default Currency</label>
            {{ form.default_currency }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Default Tax Rate (%)</label>
            {{ form.default_tax_rate }}
        </div>
    </div>
    <div class="pt-4">
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors">Save Business Details</button>
    </div>
</form>
{% endblock %}
