{% extends "settings/settings_base.html" %}
{% block nav %}{% endblock %}
{% block settings_title %}Notification Preferences{% endblock %}
{% block settings_content %}
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div class="space-y-3">
        {% for field in form %}
        <label class="flex items-start gap-4 p-4 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:bg-white hover:border-indigo-200 transition-all">
            <div class="mt-1">{{ field }}</div>
            <div>
                <div class="font-semibold text-gray-900">{{ field.label }}</div>
                <div class="text-xs text-gray-500 mt-1">{{ field.help_text }}</div>
            </div>
        </label>
        {% endfor %}
    </div>
    <div class="pt-6">
        <button type="submit" class="btn-light-primary">Save Preferences</button>
    </div>
</form>
{% endblock %}
