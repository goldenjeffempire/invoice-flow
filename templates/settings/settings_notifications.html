{% extends "settings/settings_base.html" %}
{% block settings_title %}Notification Preferences{% endblock %}
{% block settings_content %}
<form method="post" class="space-y-6">
    {% csrf_token %}
    <div class="space-y-4">
        {% for field in form %}
        <label class="flex items-start gap-4 p-4 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:bg-white hover:border-indigo-200 hover:shadow-sm transition-all group">
            <div class="mt-1">
                {{ field }}
            </div>
            <div class="flex-1">
                <div class="font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors">{{ field.label }}</div>
                {% if field.help_text %}
                <div class="text-xs text-gray-500 mt-1">{{ field.help_text }}</div>
                {% endif %}
                {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        </label>
        {% endfor %}
    </div>
    <div class="pt-6 border-t border-gray-100">
        <button type="submit" class="btn-light-primary">Save Notification Preferences</button>
    </div>
</form>
{% endblock %}
