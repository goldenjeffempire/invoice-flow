{% extends "settings/base_settings.html" %}
{% block title %}Notifications - Settings{% endblock %}
{% block settings_content %}
<h3 class="text-xl font-bold mb-6">Email Notifications</h3>
<form method="post" class="space-y-4">
    {% csrf_token %}
    <div class="space-y-3">
        {% for field in form %}
        <label class="flex items-start gap-3 p-4 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors">
            <div class="mt-1">{{ field }}</div>
            <div>
                <div class="font-medium text-gray-900">{{ field.label }}</div>
                <div class="text-xs text-gray-500">{{ field.help_text }}</div>
            </div>
        </label>
        {% endfor %}
    </div>
    <button type="submit" class="btn-light-primary mt-6">Save Preferences</button>
</form>
{% endblock %}
