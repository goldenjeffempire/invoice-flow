{% extends "settings/base_settings.html" %}

{% block settings_content %}
<div class="form-section">
  <h2>Email Notifications</h2>
  <p class="form-description">Choose which notifications you want to receive</p>

  <form method="post" class="settings-form">
    {% csrf_token %}
    
    <div class="checkbox-item">
      <label>
        {{ form.notify_invoice_created }}
        <div>
          <div style="font-weight: 500;">Invoice Created</div>
          <small class="help-text">Get notified when you create a new invoice</small>
        </div>
      </label>
    </div>

    <div class="checkbox-item">
      <label>
        {{ form.notify_payment_received }}
        <div>
          <div style="font-weight: 500;">Payment Received</div>
          <small class="help-text">Get notified when a client pays an invoice</small>
        </div>
      </label>
    </div>

    <div class="checkbox-item">
      <label>
        {{ form.notify_invoice_viewed }}
        <div>
          <div style="font-weight: 500;">Invoice Viewed</div>
          <small class="help-text">Get notified when a client views an invoice</small>
        </div>
      </label>
    </div>

    <div class="checkbox-item">
      <label>
        {{ form.notify_invoice_overdue }}
        <div>
          <div style="font-weight: 500;">Invoice Overdue</div>
          <small class="help-text">Get notified when an invoice becomes overdue</small>
        </div>
      </label>
    </div>

    <div class="checkbox-item">
      <label>
        {{ form.notify_weekly_summary }}
        <div>
          <div style="font-weight: 500;">Weekly Summary</div>
          <small class="help-text">Receive a weekly summary of your invoicing activity</small>
        </div>
      </label>
    </div>

    <div class="checkbox-item">
      <label>
        {{ form.notify_security_alerts }}
        <div>
          <div style="font-weight: 500;">Security Alerts</div>
          <small class="help-text">Get notified about account security events</small>
        </div>
      </label>
    </div>

    <div class="checkbox-item">
      <label>
        {{ form.notify_password_changes }}
        <div>
          <div style="font-weight: 500;">Password Changes</div>
          <small class="help-text">Get notified when your password is changed</small>
        </div>
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Preferences</button>
      <a href="{% url 'invoices:dashboard' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
