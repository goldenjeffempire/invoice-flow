{% extends 'settings/settings_base.html' %}
{% load static %}

{% block settings_content %}
<div class="settings-header">
    <h2 class="settings-title">Notification Preferences</h2>
    <p class="settings-subtitle">Manage how you receive alerts and business updates.</p>
</div>

<form method="post" class="space-y-6">
    {% csrf_token %}
    
    <div style="display: flex; flex-direction: column; gap: 16px;">
        <!-- Notification Toggle -->
        <label class="notification-item">
            <div class="notification-info">
                <div class="icon-box" style="background: var(--primary-light); color: var(--primary);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </div>
                <div>
                    <span class="label">Invoice Activity</span>
                    <p class="desc">Notify me when an invoice is created, viewed or paid.</p>
                </div>
            </div>
            {{ form.notify_invoice_created }}
        </label>

        <label class="notification-item">
            <div class="notification-info">
                <div class="icon-box" style="background: var(--success-light); color: var(--success);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div>
                    <span class="label">Security Alerts</span>
                    <p class="desc">Get notified about new logins and password changes.</p>
                </div>
            </div>
            {{ form.notify_security_alerts }}
        </label>

        <label class="notification-item">
            <div class="notification-info">
                <div class="icon-box" style="background: var(--warning-light); color: var(--warning);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div>
                    <span class="label">Weekly Business Insights</span>
                    <p class="desc">Summary of your revenue, pending payments, and trends.</p>
                </div>
            </div>
            {{ form.notify_weekly_summary }}
        </label>
    </div>

    <div style="margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--gray-100); display: flex; justify-content: flex-end;">
        <button type="submit" class="btn-save">Save Preferences</button>
    </div>
</form>

<style>
    .notification-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px;
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-xl);
        cursor: pointer;
        transition: var(--transition-fast);
    }

    .notification-item:hover {
        background: white;
        border-color: var(--primary);
        box-shadow: var(--shadow-md);
    }

    .notification-info {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .icon-box {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .icon-box svg {
        width: 24px;
        height: 24px;
    }

    .label {
        display: block;
        font-weight: 700;
        color: var(--gray-900);
        font-size: 1rem;
        margin-bottom: 4px;
    }

    .desc {
        font-size: 0.85rem;
        color: var(--gray-500);
    }

    input[type="checkbox"] {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        cursor: pointer;
    }
</style>
{% endblock %}
