{% extends 'base/layout-authenticated.html' %}

{% block content %}
<div class="settings-container max-w-4xl mx-auto py-8 px-4">
    <header class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Settings</h1>
        <p class="text-gray-600">Manage your account preferences and business configuration.</p>
    </header>

    <div class="flex flex-col md:flex-row gap-8">
        <aside class="w-full md:w-64">
            <nav class="flex flex-col space-y-1">
                <a href="{% url 'invoices:settings_profile' %}" class="px-4 py-2 rounded-lg {% if active_tab == 'profile' %}bg-indigo-50 text-indigo-700 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">Profile</a>
                <a href="{% url 'invoices:settings_business' %}" class="px-4 py-2 rounded-lg {% if active_tab == 'business' %}bg-indigo-50 text-indigo-700 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">Business</a>
                <a href="{% url 'invoices:settings_notifications' %}" class="px-4 py-2 rounded-lg {% if active_tab == 'notifications' %}bg-indigo-50 text-indigo-700 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">Notifications</a>
                <a href="{% url 'invoices:settings_security' %}" class="px-4 py-2 rounded-lg {% if active_tab == 'security' %}bg-indigo-50 text-indigo-700 font-medium{% else %}text-gray-600 hover:bg-gray-50{% endif %}">Security</a>
            </nav>
        </aside>

        <main class="flex-1 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            {% block settings_content %}{% endblock %}
        </main>
    </div>
</div>
{% endblock %}
