{% extends 'base/layout-authenticated.html' %}

{% block content %}
<div class="settings-page py-6 md:py-10">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Account Settings</h1>
            <p class="mt-2 text-lg text-gray-600">Manage your personal information, business profile, and security preferences.</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-10">
            <!-- Settings Sidebar -->
            <aside class="lg:w-72 flex-shrink-0">
                <nav class="space-y-1 sticky top-6">
                    <a href="{% url 'invoices:settings_profile' %}" 
                       class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all duration-200 {% if active_tab == 'profile' %}bg-indigo-600 text-white shadow-lg shadow-indigo-200{% else %}text-gray-600 hover:bg-white hover:text-indigo-600 hover:shadow-sm{% endif %}">
                        <svg class="mr-3 h-5 w-5 flex-shrink-0 {% if active_tab == 'profile' %}text-white{% else %}text-gray-400 group-hover:text-indigo-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span>Personal Profile</span>
                    </a>
                    
                    <a href="{% url 'invoices:settings_business' %}" 
                       class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all duration-200 {% if active_tab == 'business' %}bg-indigo-600 text-white shadow-lg shadow-indigo-200{% else %}text-gray-600 hover:bg-white hover:text-indigo-600 hover:shadow-sm{% endif %}">
                        <svg class="mr-3 h-5 w-5 flex-shrink-0 {% if active_tab == 'business' %}text-white{% else %}text-gray-400 group-hover:text-indigo-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                        <span>Business Profile</span>
                    </a>

                    <a href="{% url 'invoices:settings_notifications' %}" 
                       class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all duration-200 {% if active_tab == 'notifications' %}bg-indigo-600 text-white shadow-lg shadow-indigo-200{% else %}text-gray-600 hover:bg-white hover:text-indigo-600 hover:shadow-sm{% endif %}">
                        <svg class="mr-3 h-5 w-5 flex-shrink-0 {% if active_tab == 'notifications' %}text-white{% else %}text-gray-400 group-hover:text-indigo-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                        <span>Notifications</span>
                    </a>

                    <a href="{% url 'invoices:settings_security' %}" 
                       class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all duration-200 {% if active_tab == 'security' %}bg-indigo-600 text-white shadow-lg shadow-indigo-200{% else %}text-gray-600 hover:bg-white hover:text-indigo-600 hover:shadow-sm{% endif %}">
                        <svg class="mr-3 h-5 w-5 flex-shrink-0 {% if active_tab == 'security' %}text-white{% else %}text-gray-400 group-hover:text-indigo-600{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <span>Security & Privacy</span>
                    </a>
                </nav>
            </aside>

            <!-- Settings Content -->
            <main class="flex-1 min-w-0">
                <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden transition-all duration-300">
                    <div class="p-6 md:p-10">
                        {% block settings_content %}{% endblock %}
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<style>
    /* Advanced Form Styling for Settings */
    .settings-page .form-light-input,
    .settings-page .form-light-select,
    .settings-page .form-light-textarea {
        @apply w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all duration-200 outline-none text-gray-900 placeholder-gray-400;
    }
    
    .settings-page label {
        @apply block text-sm font-bold text-gray-700 mb-2 tracking-tight;
    }

    .settings-page .help-text {
        @apply mt-2 text-xs text-gray-500 leading-relaxed;
    }

    .settings-page .errorlist {
        @apply mt-2 text-sm text-red-600 font-medium list-none p-0;
    }
</style>
{% endblock %}
