<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InvoiceFlow{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .hover-lift { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hover-lift:hover { transform: translateY(-8px); }
        .text-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .button-glow:hover { box-shadow: 0 0 25px rgba(79, 70, 229, 0.4); }
        [data-aos] { pointer-events: none; }
        [data-aos].aos-animate { pointer-events: auto; }

        /* Smooth Scroll Padding */
        section { scroll-margin-top: 80px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="sticky top-0 z-50 glass border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'invoices:dashboard' %}" class="flex items-center gap-2 text-2xl font-extrabold tracking-tighter">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
                </div>
                <span>Invoice<span class="text-indigo-600">Flow</span></span>
            </a>
            <div class="hidden lg:flex items-center gap-8 font-semibold text-slate-600">
                <a href="{% url 'invoices:dashboard' %}" class="hover:text-indigo-600 transition-colors">Dashboard</a>
                <a href="{% url 'invoices:invoices_list' %}" class="hover:text-indigo-600 transition-colors">Invoices</a>
                <a href="{% url 'invoices:invoice_create' %}" class="hover:text-indigo-600 transition-colors">Create</a>
                <a href="{% url 'invoices:analytics' %}" class="hover:text-indigo-600 transition-colors">Analytics</a>
                <a href="{% url 'invoices:settings' %}" class="hover:text-indigo-600 transition-colors">Settings</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="{% url 'invoices:invoice_create' %}" class="hidden sm:inline-flex bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 hover:scale-[1.02] transform transition-all">
                    New Invoice
                </a>
                <form method="post" action="{% url 'invoices:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="font-bold text-slate-600 hover:text-indigo-600 transition-colors">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="bg-white border-t border-slate-100 py-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-sm">
            <p>&copy; 2026 InvoiceFlow Technologies Inc. Built for performance.</p>
            <div class="flex gap-6">
                <a href="#" class="hover:text-slate-900 transition-colors"><i data-lucide="twitter" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-slate-900 transition-colors"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-slate-900 transition-colors"><i data-lucide="github" class="w-5 h-5"></i></a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
