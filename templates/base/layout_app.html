<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InvoiceFlow{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.12), transparent 45%),
                radial-gradient(circle at 30% 20%, rgba(125, 211, 252, 0.12), transparent 35%),
                radial-gradient(circle at bottom right, rgba(129, 140, 248, 0.14), transparent 40%);
            z-index: -1;
        }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
        .hover-lift { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease; }
        .hover-lift:hover { transform: translateY(-8px); box-shadow: 0 20px 45px -30px rgba(15, 23, 42, 0.35); }
        .text-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 60%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .button-glow:hover { box-shadow: 0 0 35px rgba(79, 70, 229, 0.35); }
        .card-glass {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.7));
            border: 1px solid rgba(226, 232, 240, 0.7);
            box-shadow: 0 20px 40px -30px rgba(15, 23, 42, 0.4);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: #fff;
            box-shadow: 0 20px 40px -25px rgba(79, 70, 229, 0.6);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        [data-aos] { pointer-events: none; }
        [data-aos].aos-animate { pointer-events: auto; }
        a:focus-visible,
        button:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }
        .input-modern {
            width: 100%;
            border-radius: 0.9rem;
            border: 1px solid #e2e8f0;
            padding: 0.75rem 1rem;
            background-color: #fff;
            color: #0f172a;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .input-modern:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .errorlist {
            margin-top: 0.5rem;
            color: #e11d48;
            font-weight: 600;
            font-size: 0.85rem;
        }

        section { scroll-margin-top: 80px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 bg-white text-slate-900 px-4 py-2 rounded-lg shadow-lg">
        Skip to content
    </a>
    <main id="main-content" class="min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-100 py-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-sm">
            <p>&copy; 2026 InvoiceFlow Technologies Inc. Built for performance.</p>
            <div class="flex gap-6">
                <a href="#" class="hover:text-slate-900 transition-colors"><i data-lucide="twitter" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-slate-900 transition-colors"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-slate-900 transition-colors"><i data-lucide="github" class="w-5 h-5"></i></a>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
