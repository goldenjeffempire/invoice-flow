{% load static %}
<!doctype html>
<html lang="en" class="h-full scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="{% block meta_description %}InvoiceFlow - Modern invoicing made simple. Create, send, and track invoices effortlessly.{% endblock %}" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>{% block title %}InvoiceFlow{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <link rel="stylesheet" href="{% static 'css/design-system.css' %}">

  {% block head %}{% endblock %}

  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary: #64748b;
      --success: #10b981;
      --danger: #ef4444;
      --background: #f8fafc;
    }

    .page-transition {
      animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-gradient {
      background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    
    .btn-gradient:hover {
      background: linear-gradient(135deg, #3b82f6 0%, var(--primary) 100%);
      transform: translateY(-1.5px);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2), 0 4px 6px -4px rgba(37, 99, 235, 0.1);
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(226, 232, 240, 0.8);
    }

    .card-modern {
      @apply bg-white rounded-2xl border border-slate-200/60 shadow-sm transition-all duration-300;
    }
    .card-modern:hover {
      @apply shadow-md border-slate-300/60;
    }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="min-h-full bg-slate-50 text-slate-900 font-sans antialiased">
  <a href="#content" class="skip-link">Skip to main content</a>
  
  <div class="scroll-progress" aria-hidden="true"></div>

  {% block body %}
  <main id="content" class="min-h-screen page-transition">
    {% block content %}{% endblock %}
  </main>
  {% endblock %}

  <div class="toast-container" role="alert" aria-live="polite"></div>

  <button class="scroll-to-top" aria-label="Scroll to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="{% static 'js/app.js' %}"></script>
  <script>
    lucide.createIcons();
    
    document.querySelectorAll('img').forEach(img => {
      if (img.complete) {
        img.classList.add('loaded');
      } else {
        img.addEventListener('load', () => img.classList.add('loaded'));
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
