{% load static %}
<!doctype html>
<html lang="en" class="h-full scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="{% block meta_description %}InvoiceFlow - Modern invoicing made simple. Create, send, and track invoices effortlessly.{% endblock %}" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>{% block title %}InvoiceFlow{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <link rel="stylesheet" href="{% static 'css/design-system.css' %}">

  {% block head %}{% endblock %}

  <style>
    .page-transition {
      animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .btn-gradient {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transition: all 0.2s ease;
    }
    
    .btn-gradient:hover {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="min-h-full bg-slate-50 text-slate-900 font-sans antialiased">
  <a href="#content" class="skip-link">Skip to main content</a>
  
  <div class="scroll-progress" aria-hidden="true"></div>

  {% block body %}
  <main id="content" class="min-h-screen page-transition">
    {% block content %}{% endblock %}
  </main>
  {% endblock %}

  <div class="toast-container" role="alert" aria-live="polite"></div>

  <button class="scroll-to-top" aria-label="Scroll to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="{% static 'js/app.js' %}"></script>
  <script>
    lucide.createIcons();
    
    document.querySelectorAll('img').forEach(img => {
      if (img.complete) {
        img.classList.add('loaded');
      } else {
        img.addEventListener('load', () => img.classList.add('loaded'));
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
