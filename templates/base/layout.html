{% load static %}
<!doctype html>
<html lang="en" class="h-full scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="color-scheme" content="light" />
  <title>{% block title %}InvoiceFlow{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/design-system.css' %}">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui'] },
          boxShadow: {
            soft: '0 10px 30px rgba(2, 6, 23, 0.08)',
          },
        }
      }
    }
  </script>

  {% block head %}{% endblock %}
</head>
<body class="min-h-full bg-slate-50 text-slate-900 font-sans antialiased">
  <a href="#content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 bg-white px-3 py-2 rounded-md shadow-soft">Skip to content</a>

  {% block body %}
  <main id="content" class="min-h-screen">
    {% block content %}{% endblock %}
  </main>
  {% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
