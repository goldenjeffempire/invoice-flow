{% extends "base/layout_app.html" %}
{% block title %}Create Invoice - InvoiceFlow{% endblock %}
{% block content %}
<div class="p-6 max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold mb-8">Create New Invoice</h1>
    <div class="bg-white rounded-2xl shadow-sm p-8 border border-gray-100">
        <form method="POST">
            {% csrf_token %}
            <div class="grid md:grid-cols-2 gap-8 mb-12">
                <div class="space-y-4">
                    <label class="block text-sm font-semibold text-gray-700">Select Client</label>
                    <select name="client" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                        <option value="">-- Choose Client --</option>
                        {% for client in clients %}
                        <option value="{{ client.id }}">{{ client.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-4">
                        <label class="block text-sm font-semibold text-gray-700">Issue Date</label>
                        <input type="date" name="issue_date" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-4">
                        <label class="block text-sm font-semibold text-gray-700">Due Date</label>
                        <input type="date" name="due_date" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>
            <!-- Item builder placeholder -->
            <div class="mb-12">
                <h3 class="font-bold text-lg mb-4">Line Items</h3>
                <div class="border border-dashed border-gray-200 rounded-2xl p-12 text-center text-gray-400">
                    Builder interface powered by Alpine.js coming in next phase.
                </div>
            </div>
            <div class="flex justify-end gap-4">
                <button type="button" class="px-6 py-3 border border-gray-300 rounded-xl font-semibold">Save Draft</button>
                <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-semibold">Create & Send</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
