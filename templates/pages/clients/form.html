{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto p-6">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900">{% if client %}Edit Client{% else %}New Client{% endif %}</h1>
        <p class="text-sm text-gray-500">Provide basic information to start invoicing this client.</p>
    </div>

    <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Full Name / Company Name</label>
                    <input type="text" name="name" value="{{ client.name }}" class="block w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-lg" placeholder="e.g. Acme Corp or John Doe" required>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" value="{{ client.email }}" class="block w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="billing@client.com" required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Phone Number</label>
                    <input type="text" name="phone" value="{{ client.phone }}" class="block w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="+234 800 000 0000">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Currency</label>
                    <select name="currency" class="block w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="NGN" {% if client.currency == 'NGN' %}selected{% endif %}>NGN - Nigerian Naira</option>
                        <option value="USD" {% if client.currency == 'USD' %}selected{% endif %}>USD - US Dollar</option>
                        <option value="EUR" {% if client.currency == 'EUR' %}selected{% endif %}>EUR - Euro</option>
                        <option value="GBP" {% if client.currency == 'GBP' %}selected{% endif %}>GBP - British Pound</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Tax ID / VAT Number</label>
                    <input type="text" name="tax_id" value="{{ client.tax_id }}" class="block w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="Optional">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Billing Address</label>
                    <textarea name="billing_address" rows="3" class="block w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="Street address, City, State, Country">{{ client.billing_address }}</textarea>
                </div>
            </div>

            <div class="pt-8 border-t flex justify-end space-x-4">
                <a href="{% if client %}{% url 'invoices:client_detail' client.id %}{% else %}{% url 'invoices:client_list' %}{% endif %}" class="px-6 py-2 text-gray-600 hover:text-gray-900 font-medium">Cancel</a>
                <button type="submit" class="bg-indigo-600 text-white px-8 py-2 rounded-lg hover:bg-indigo-700 font-bold shadow-md transition-all active:scale-95">
                    {% if client %}Update Client{% else %}Save Client{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
