{% extends "base/layout_app.html" %}
{% block title %}New Client | InvoiceFlow{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800">
    <h1 class="text-2xl font-bold mb-6">Add New Client</h1>
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-bold mb-1">Client Name</label>
            <input type="text" name="name" required class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
        </div>
        <div>
            <label class="block text-sm font-bold mb-1">Email Address</label>
            <input type="email" name="email" required class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
        </div>
        <div>
            <label class="block text-sm font-bold mb-1">Phone Number</label>
            <input type="text" name="phone" class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
        </div>
        <div>
            <label class="block text-sm font-bold mb-1">Billing Address</label>
            <textarea name="billing_address" class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700"></textarea>
        </div>
        <div>
            <label class="block text-sm font-bold mb-1">Tax ID / VAT Number</label>
            <input type="text" name="tax_id" class="w-full p-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700">
        </div>
        <div class="pt-4 flex gap-3">
            <button type="submit" class="btn btn-primary flex-1">Create Client</button>
            <a href="{% url 'invoices:client_list' %}" class="btn border border-slate-200 dark:border-slate-800 px-6">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
