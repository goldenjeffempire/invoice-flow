{% extends "base/layout_app.html" %}
{% block title %}Clients | InvoiceFlow{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Clients</h1>
        <a href="{% url 'invoices:client_create' %}" class="btn btn-primary">Add Client</a>
    </div>
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
        <table class="w-full">
            <thead class="bg-slate-50 dark:bg-slate-800">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Client</th>
                    <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Email</th>
                    <th class="px-6 py-3 text-right text-xs font-bold text-slate-500 uppercase">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                {% for client in clients %}
                <tr>
                    <td class="px-6 py-4 font-bold text-slate-900 dark:text-white">{{ client.name }}</td>
                    <td class="px-6 py-4 text-slate-500">{{ client.email }}</td>
                    <td class="px-6 py-4 text-right">
                        <a href="{% url 'invoices:client_profile' client.pk %}" class="text-indigo-600 font-bold">View Profile</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="px-6 py-12 text-center text-slate-500 italic">No clients yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
