{% extends 'base/layout.html' %}
{% block title %}Settings | InvoiceFlow{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-8">Business Settings</h1>
    <form method="post" class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700">Company Name</label>
            <input type="text" name="company_name" value="{{ profile.company_name }}" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Business Email</label>
            <input type="email" name="business_email" value="{{ profile.business_email }}" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700">Save Settings</button>
    </form>
</div>
{% endblock %}
