{% extends 'base/layout.html' %}
{% block title %}Analytics | InvoiceFlow{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-8">Business Analytics</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-lg font-semibold mb-4">Revenue Trend</h3>
            <canvas id="revenueChart"></canvas>
        </div>
        <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-lg font-semibold mb-4">Payment Status</h3>
            <canvas id="statusChart"></canvas>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const revenueCtx = document.getElementById('revenueChart').getContext('2d');
    new Chart(revenueCtx, {
        type: 'line',
        data: {
            labels: {{ revenue_data|safe }}.map(d => 'Month ' + d.month),
            datasets: [{
                label: 'Revenue',
                data: {{ revenue_data|safe }}.map(d => d.total),
                borderColor: 'rgb(79, 70, 229)',
                tension: 0.1
            }]
        }
    });
    const statusCtx = document.getElementById('statusChart').getContext('2d');
    new Chart(statusCtx, {
        type: 'doughnut',
        data: {
            labels: {{ status_counts|safe }}.map(d => d.status),
            datasets: [{
                data: {{ status_counts|safe }}.map(d => d.count),
                backgroundColor: ['#10B981', '#F59E0B', '#EF4444']
            }]
        }
    });
</script>
{% endblock %}
