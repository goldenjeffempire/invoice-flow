{% extends "base/layout.html" %}
{% block title %}Payment Settings - InvoiceFlow Setup{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-12 px-4">
    <div class="max-w-3xl mx-auto">
        {% include "pages/onboarding/_progress.html" %}
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100 mt-8">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-900">Payment Settings</h1>
                <p class="mt-2 text-gray-600">Set up how you receive payments</p>
            </div>
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Bank Name</label>
                        <input type="text" name="bank_name" value="{{ profile.bank_name }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="e.g., First Bank">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Account Name</label>
                        <input type="text" name="bank_account_name" value="{{ profile.bank_account_name }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Account Number</label>
                        <input type="text" name="bank_account_number" value="{{ profile.bank_account_number }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Payment Methods Accepted</label>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="accept_bank_transfers" checked class="w-5 h-5 rounded text-indigo-600">
                            <span class="font-medium text-gray-900">Bank Transfer</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="accept_card_payments" {% if profile.accept_card_payments %}checked{% endif %} class="w-5 h-5 rounded text-indigo-600">
                            <span class="font-medium text-gray-900">Card Payments</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" name="accept_mobile_money" {% if profile.accept_mobile_money %}checked{% endif %} class="w-5 h-5 rounded text-indigo-600">
                            <span class="font-medium text-gray-900">Mobile Money</span>
                        </label>
                    </div>
                </div>
                <div class="flex items-center justify-between gap-4 pt-4">
                    <a href="{% url 'invoices:onboarding_tax' %}" class="px-6 py-3 text-gray-700 hover:text-gray-900 font-medium">
                        <svg class="w-5 h-5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        Back
                    </a>
                    <button type="submit" class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-all">Continue</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
