{% extends "base/layout.html" %}
{% block title %}Branding - InvoiceFlow Setup{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-12 px-4">
    <div class="max-w-3xl mx-auto">
        {% include "pages/onboarding/_progress.html" %}
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100 mt-8">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-900">Branding</h1>
                <p class="mt-2 text-gray-600">Customize how your invoices look</p>
            </div>
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Primary Color</label>
                        <input type="color" name="primary_color" value="{{ profile.primary_color|default:'#6366f1' }}" class="w-full h-12 rounded-lg cursor-pointer border border-gray-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Secondary Color</label>
                        <input type="color" name="secondary_color" value="{{ profile.secondary_color|default:'#8b5cf6' }}" class="w-full h-12 rounded-lg cursor-pointer border border-gray-300">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Accent Color</label>
                        <input type="color" name="accent_color" value="{{ profile.accent_color|default:'#10b981' }}" class="w-full h-12 rounded-lg cursor-pointer border border-gray-300">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Invoice Style</label>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                        {% for code, name in styles %}
                        <label class="relative cursor-pointer">
                            <input type="radio" name="invoice_style" value="{{ code }}" class="peer sr-only" {% if profile.invoice_style == code %}checked{% endif %}>
                            <div class="p-4 border-2 border-gray-200 rounded-xl text-center transition-all peer-checked:border-indigo-600 peer-checked:bg-indigo-50 hover:border-gray-300">
                                <span class="text-sm font-medium text-gray-900">{{ name }}</span>
                            </div>
                        </label>
                        {% endfor %}
                    </div>
                </div>
                <div class="flex items-center justify-between gap-4 pt-4">
                    <a href="{% url 'invoices:onboarding_business' %}" class="px-6 py-3 text-gray-700 hover:text-gray-900 font-medium">
                        <svg class="w-5 h-5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        Back
                    </a>
                    <button type="submit" class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition-all">
                        Continue
                        <svg class="w-5 h-5 inline-block ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
