<div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
    <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-medium text-gray-700">Setup Progress</span>
        <span class="text-sm text-indigo-600 font-semibold">{{ state.progress_percentage }}%</span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
        <div class="bg-indigo-600 h-2 rounded-full transition-all duration-500" style="width: {{ state.progress_percentage }}%"></div>
    </div>
    <div class="flex items-center justify-between overflow-x-auto pb-2">
        {% for step in state.steps %}
        <div class="flex flex-col items-center min-w-[60px]">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-medium transition-all
                {% if step.status == 'completed' %}bg-green-100 text-green-600
                {% elif step.status == 'current' %}bg-indigo-600 text-white ring-4 ring-indigo-200
                {% else %}bg-gray-100 text-gray-400{% endif %}">
                {% if step.status == 'completed' %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
                {% else %}
                {{ step.id }}
                {% endif %}
            </div>
            <span class="mt-1 text-xs {% if step.status == 'current' %}text-indigo-600 font-medium{% else %}text-gray-500{% endif %} truncate max-w-[80px]">{{ step.name }}</span>
        </div>
        {% if not forloop.last %}
        <div class="flex-1 h-0.5 mx-1 {% if step.status == 'completed' %}bg-green-300{% else %}bg-gray-200{% endif %}"></div>
        {% endif %}
        {% endfor %}
    </div>
</div>
