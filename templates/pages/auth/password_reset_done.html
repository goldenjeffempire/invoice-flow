{% extends "base/layout.html" %}

{% block title %}Reset Email Sent | InvoiceFlow{% endblock %}

{% block content %}
<section class="min-h-screen py-16 px-6 flex items-center justify-center">
    <div class="w-full max-w-lg">
        <div class="card-glass rounded-[2.5rem] p-8 md:p-10 text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-3">Check your email</h1>
            <p class="text-slate-600 mb-6">If an account exists for that email, we sent a secure password reset link.</p>
            <a href="{% url 'invoices:login' %}" class="btn-primary inline-flex items-center justify-center px-6 py-3 rounded-xl font-semibold hover:scale-[1.01] transition">Back to login</a>
        </div>
    </div>
</section>
{% endblock %}
