{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
        <h1 class="text-2xl font-semibold text-slate-900">Security Activity</h1>
        <div class="mt-6 overflow-hidden bg-white shadow sm:rounded-md">
            <ul role="list" class="divide-y divide-slate-200">
                {% for activity in activities %}
                <li class="px-4 py-4 sm:px-6">
                    <div class="flex items-center justify-between">
                        <p class="truncate text-sm font-medium text-indigo-600">{{ activity.action }}</p>
                        <div class="ml-2 flex flex-shrink-0">
                            <p class="inline-flex rounded-full bg-green-100 px-2 text-xs font-semibold leading-5 text-green-800">{{ activity.timestamp }}</p>
                        </div>
                    </div>
                    <div class="mt-2 sm:flex sm:justify-between">
                        <div class="sm:flex">
                            <p class="flex items-center text-sm text-slate-500">{{ activity.ip_address }}</p>
                        </div>
                    </div>
                </li>
                {% empty %}
                <li class="px-4 py-4 sm:px-6 text-sm text-slate-500 text-center">No recent security activity.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
