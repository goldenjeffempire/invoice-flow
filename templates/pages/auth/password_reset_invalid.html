{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 text-center">
        <h2 class="mt-6 text-3xl font-extrabold text-slate-900">Invalid Password Reset Link</h2>
        <p class="mt-2 text-sm text-slate-600">
            The password reset link was invalid, possibly because it has already been used. Please request a new password reset.
        </p>
        <div class="mt-6">
            <a href="{% url 'password_reset' %}" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Request new link
            </a>
        </div>
    </div>
</div>
{% endblock %}
