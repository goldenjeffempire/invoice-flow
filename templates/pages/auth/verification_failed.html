{% extends "base/layout.html" %}

{% block title %}Verification Failed | InvoiceFlow{% endblock %}

{% block content %}
<section class="min-h-screen bg-slate-50 py-16">
    <div class="max-w-lg mx-auto px-6">
        <div class="bg-white rounded-3xl shadow-xl shadow-indigo-100/50 border border-slate-100 p-8 text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-3">Verification link invalid</h1>
            <p class="text-slate-600 mb-6">This verification link is invalid or has expired. Request a new one to continue.</p>
            <a href="{% url 'invoices:resend_verification' %}" class="inline-flex items-center justify-center bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 transition">Request new link</a>
        </div>
    </div>
</section>
{% endblock %}
