{% extends "base/layout.html" %}

{% block title %}Create Invoice | InvoiceFlow{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-12" data-aos="fade-up">
    <div class="mb-12">
        <h1 class="text-4xl font-black text-slate-900 mb-2">New Invoice</h1>
        <p class="text-slate-500">Craft a professional billing document.</p>
    </div>

    <form method="post" class="space-y-12 bg-white p-12 rounded-[3rem] border border-slate-100 shadow-xl">
        {% csrf_token %}
        
        <div class="space-y-8">
            <h3 class="text-xl font-black">Client Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Full Name</label>
                    <input type="text" name="client_name" required class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-transparent focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Email Address</label>
                    <input type="email" name="client_email" required class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-transparent focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
            </div>
        </div>

        <div class="space-y-8 pt-12 border-t border-slate-50">
            <h3 class="text-xl font-black">Invoice Settings</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Due Date</label>
                    <input type="date" name="due_date" required class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-transparent focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Currency</label>
                    <select name="currency" class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-transparent focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="NGN">NGN (₦)</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Tax Rate (%)</label>
                    <input type="number" step="0.01" name="tax_rate" value="0" class="w-full bg-slate-50 px-6 py-4 rounded-2xl border-transparent focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
            </div>
        </div>

        <div class="space-y-8 pt-12 border-t border-slate-50">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-black">Line Items</h3>
                <button type="button" id="add-item" class="text-sm font-black text-indigo-600 flex items-center gap-2 px-4 py-2 bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-all">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Item
                </button>
            </div>
            
            <div id="line-items" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end bg-slate-50 p-6 rounded-[2rem] line-item">
                    <div class="md:col-span-6 space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Description</label>
                        <input type="text" name="item_description[]" required class="w-full bg-white px-4 py-3 rounded-xl border-slate-100 outline-none text-sm">
                    </div>
                    <div class="md:col-span-2 space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Qty</label>
                        <input type="number" step="0.01" name="item_quantity[]" value="1" required class="w-full bg-white px-4 py-3 rounded-xl border-slate-100 outline-none text-sm qty-input">
                    </div>
                    <div class="md:col-span-3 space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Price</label>
                        <input type="number" step="0.01" name="item_price[]" required class="w-full bg-white px-4 py-3 rounded-xl border-slate-100 outline-none text-sm price-input">
                    </div>
                    <div class="md:col-span-1 pb-1">
                        <button type="button" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-rose-500 remove-item transition-colors">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="pt-12 flex justify-between items-center">
            <a href="{% url 'invoices:invoices_list' %}" class="text-slate-400 font-bold hover:text-slate-600 transition-colors">Cancel</a>
            <button type="submit" class="bg-slate-900 text-white px-12 py-5 rounded-2xl font-black text-lg hover:scale-105 transition-all shadow-xl">
                Generate Invoice
            </button>
        </div>
    </form>
</div>

<script>
    const container = document.getElementById('line-items');
    const addButton = document.getElementById('add-item');
    
    addButton.addEventListener('click', () => {
        const newItem = container.firstElementChild.cloneNode(true);
        newItem.querySelectorAll('input').forEach(input => input.value = input.name === 'item_quantity[]' ? '1' : '');
        newItem.querySelector('.remove-item').addEventListener('click', () => {
            if (container.children.length > 1) newItem.remove();
        });
        container.appendChild(newItem);
        lucide.createIcons();
    });

    document.querySelectorAll('.remove-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (container.children.length > 1) e.currentTarget.closest('.line-item').remove();
        });
    });
</script>
{% endblock %}
