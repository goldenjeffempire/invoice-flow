{% extends 'base/layout.html' %}
{% load static %}

{% block title %}Create Invoice | InvoiceFlow{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Create New Invoice</h1>
        <p class="text-gray-500">Enter client details and line items to generate an invoice.</p>
    </div>

    <form method="post" class="space-y-8 bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
        {% csrf_token %}
        
        <!-- Client Details -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">Client Name</label>
                <input type="text" name="client_name" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">Client Email</label>
                <input type="email" name="client_email" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </div>

        <!-- Dates & Currency -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">Due Date</label>
                <input type="date" name="due_date" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">Currency</label>
                <select name="currency" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="GBP">GBP (£)</option>
                    <option value="NGN">NGN (₦)</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">Tax Rate (%)</label>
                <input type="number" step="0.01" name="tax_rate" value="0" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </div>

        <!-- Line Items -->
        <div class="space-y-4">
            <h3 class="text-lg font-medium text-gray-900">Line Items</h3>
            <div id="line-items" class="space-y-3">
                <div class="grid grid-cols-12 gap-4 items-end bg-gray-50 p-4 rounded-lg">
                    <div class="col-span-6 space-y-1">
                        <label class="text-xs font-medium text-gray-500">Description</label>
                        <input type="text" name="item_description[]" required class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                    </div>
                    <div class="col-span-2 space-y-1">
                        <label class="text-xs font-medium text-gray-500">Qty</label>
                        <input type="number" step="0.01" name="item_quantity[]" required class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                    </div>
                    <div class="col-span-3 space-y-1">
                        <label class="text-xs font-medium text-gray-500">Price</label>
                        <input type="number" step="0.01" name="item_price[]" required class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                    </div>
                </div>
            </div>
            <button type="button" class="text-sm text-indigo-600 font-medium hover:text-indigo-800 flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Add another item
            </button>
        </div>

        <div class="pt-6 border-t border-gray-200 flex justify-end">
            <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-md hover:bg-indigo-700 transition shadow-md font-medium">
                Create & Save Invoice
            </button>
        </div>
    </form>
</div>
{% endblock %}
