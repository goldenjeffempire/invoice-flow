{% extends "base/layout_app.html" %}
{% block title %}Edit Schedule — InvoiceFlow{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'invoices:schedule_detail' schedule.id %}" class="w-8 h-8 rounded-lg flex items-center justify-center border border-slate-200 dark:border-slate-700 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <h1 class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">Edit Schedule</h1>
  </div>

  <form method="post" action="{% url 'invoices:schedule_edit' schedule.id %}">
    {% csrf_token %}
    <div class="card p-6 mb-4 space-y-4">
      <div>
        <label class="lbl">Description <span class="text-rose-500">*</span></label>
        <input type="text" name="description" required value="{{ schedule.description }}" class="fi text-sm">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="lbl">Amount <span class="text-rose-500">*</span></label>
          <input type="number" name="amount" required min="0.01" step="any" value="{{ schedule.amount }}" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">Currency</label>
          <select name="currency" class="fi text-sm">
            <option value="NGN" {% if schedule.currency == 'NGN' %}selected{% endif %}>₦ NGN</option>
            <option value="USD" {% if schedule.currency == 'USD' %}selected{% endif %}>$ USD</option>
            <option value="EUR" {% if schedule.currency == 'EUR' %}selected{% endif %}>€ EUR</option>
            <option value="GBP" {% if schedule.currency == 'GBP' %}selected{% endif %}>£ GBP</option>
          </select>
        </div>
        <div>
          <label class="lbl">Interval Value</label>
          <input type="number" name="interval_value" min="1" value="{{ schedule.interval_value }}" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">Interval Type</label>
          <select name="interval_type" class="fi text-sm">
            {% if interval_choices %}
              {% for value, label in interval_choices %}<option value="{{ value }}" {% if schedule.interval_type == value %}selected{% endif %}>{{ label }}</option>{% endfor %}
            {% else %}
              <option value="monthly" {% if schedule.interval_type == 'monthly' %}selected{% endif %}>Monthly</option>
              <option value="weekly" {% if schedule.interval_type == 'weekly' %}selected{% endif %}>Weekly</option>
              <option value="quarterly" {% if schedule.interval_type == 'quarterly' %}selected{% endif %}>Quarterly</option>
              <option value="annually" {% if schedule.interval_type == 'annually' %}selected{% endif %}>Annually</option>
            {% endif %}
          </select>
        </div>
        <div>
          <label class="lbl">Due Days After Issue</label>
          <input type="number" name="due_days" min="0" value="{{ schedule.due_days|default:30 }}" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">End Date (optional)</label>
          <input type="date" name="end_date" value="{{ schedule.end_date|date:'Y-m-d'|default:'' }}" class="fi text-sm">
        </div>
      </div>
      <div>
        <label class="lbl">Notes</label>
        <textarea name="notes" rows="3" class="fi text-sm">{{ schedule.notes|default:'' }}</textarea>
      </div>
      <div class="flex items-center gap-2">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="auto_send" value="true" {% if schedule.auto_send %}checked{% endif %} class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
          <span class="text-sm text-slate-600 dark:text-slate-400">Auto-send invoices to client</span>
        </label>
      </div>
    </div>
    <div class="flex items-center justify-end gap-3">
      <a href="{% url 'invoices:schedule_detail' schedule.id %}" class="px-4 py-2 text-sm text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-colors">Cancel</a>
      <button type="submit" class="px-6 py-2.5 bg-violet-600 hover:bg-violet-700 text-white text-sm font-bold rounded-xl transition-colors">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
