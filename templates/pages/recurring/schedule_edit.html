{% extends "base/layout_app.html" %}
{% load static %}
{% block title %}Edit Schedule — InvoiceFlow{% endblock %}
{% block page_title %}Edit Schedule{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'invoices:schedule_detail' schedule.id %}" class="flex items-center justify-center w-8 h-8 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <div>
      <h1 class="text-xl font-bold text-slate-900 dark:text-white">Edit Schedule</h1>
      <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{{ schedule.description }}</p>
    </div>
  </div>

  <form method="post" class="space-y-5">
    {% csrf_token %}
    <div class="bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800 rounded-2xl p-5">
      <h3 class="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4">Schedule Details</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2">
          <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1.5">Schedule Name *</label>
          <input type="text" name="description" value="{{ schedule.description }}" required class="w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:border-brand-400 transition-colors">
        </div>
        <div>
          <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1.5">Client *</label>
          <select name="client_id" required class="w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:border-brand-400 transition-colors">
            {% for c in clients %}<option value="{{ c.id }}" {% if schedule.client_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1.5">Amount *</label>
          <input type="number" name="total_amount" value="{{ schedule.total_amount }}" required min="0.01" step="0.01" class="w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:border-brand-400 transition-colors tabular-nums">
        </div>
        <div>
          <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1.5">Frequency *</label>
          <select name="interval_type" required class="w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:border-brand-400 transition-colors">
            <option value="weekly" {% if schedule.interval_type == 'weekly' %}selected{% endif %}>Weekly</option>
            <option value="biweekly" {% if schedule.interval_type == 'biweekly' %}selected{% endif %}>Bi-weekly</option>
            <option value="monthly" {% if schedule.interval_type == 'monthly' %}selected{% endif %}>Monthly</option>
            <option value="quarterly" {% if schedule.interval_type == 'quarterly' %}selected{% endif %}>Quarterly</option>
            <option value="yearly" {% if schedule.interval_type == 'yearly' %}selected{% endif %}>Annually</option>
            <option value="custom" {% if schedule.interval_type == 'custom' %}selected{% endif %}>Custom</option>
          </select>
        </div>
        <div>
          <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1.5">End Date</label>
          <input type="date" name="end_date" value="{{ schedule.end_date|date:'Y-m-d'|default:'' }}" class="w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:border-brand-400 transition-colors">
        </div>
        <div>
          <label class="block text-[11px] font-bold uppercase tracking-wide text-slate-500 dark:text-slate-400 mb-1.5">Due Days After Issue</label>
          <input type="number" name="due_days" value="{{ schedule.due_days|default:30 }}" min="0" class="w-full px-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 text-sm focus:outline-none focus:border-brand-400 transition-colors">
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3 justify-end">
      <a href="{% url 'invoices:schedule_detail' schedule.id %}" class="px-5 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Cancel</a>
      <button type="submit" class="flex items-center gap-2 px-6 py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-bold rounded-xl transition-colors shadow-sm shadow-brand-600/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
