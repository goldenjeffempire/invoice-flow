{% extends "base/layout_app.html" %}
{% block title %}Edit {{ schedule.name }} — InvoiceFlow{% endblock %}
{% block content %}

<div style="max-width:760px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <a href="{% url 'invoices:recurring_detail' schedule.id %}" class="btn btn-ghost btn-sm btn-icon"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg></a>
    <div>
      <h1 style="font-size:20px;font-weight:800;letter-spacing:-.3px;margin:0">Edit Schedule</h1>
      <p style="font-size:13px;color:var(--text-muted);margin:2px 0 0">{{ schedule.name }}</p>
    </div>
  </div>

  <form method="post" action="{% url 'invoices:recurring_edit' schedule.id %}">
    {% csrf_token %}
    <div class="card" style="padding:24px;margin-bottom:16px">
      <h2 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin:0 0 18px">Schedule Details</h2>
      <div class="form-group">
        <label class="form-label">Schedule Name *</label>
        <input type="text" name="name" class="form-input" value="{{ schedule.name }}" required>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Client *</label>
          <select name="client_id" class="form-select" required>
            {% for cl in clients %}
            <option value="{{ cl.id }}" {% if schedule.client_id == cl.id %}selected{% endif %}>{{ cl.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Frequency *</label>
          <select name="frequency" class="form-select" required>
            <option value="weekly" {% if schedule.frequency == 'weekly' %}selected{% endif %}>Weekly</option>
            <option value="biweekly" {% if schedule.frequency == 'biweekly' %}selected{% endif %}>Every 2 Weeks</option>
            <option value="monthly" {% if schedule.frequency == 'monthly' %}selected{% endif %}>Monthly</option>
            <option value="quarterly" {% if schedule.frequency == 'quarterly' %}selected{% endif %}>Quarterly</option>
            <option value="biannually" {% if schedule.frequency == 'biannually' %}selected{% endif %}>Every 6 Months</option>
            <option value="annually" {% if schedule.frequency == 'annually' %}selected{% endif %}>Annually</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            <option value="active" {% if schedule.status == 'active' %}selected{% endif %}>Active</option>
            <option value="paused" {% if schedule.status == 'paused' %}selected{% endif %}>Paused</option>
            <option value="cancelled" {% if schedule.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Auto-send</label>
          <select name="auto_send" class="form-select">
            <option value="false" {% if not schedule.auto_send %}selected{% endif %}>No — Save as Draft</option>
            <option value="true" {% if schedule.auto_send %}selected{% endif %}>Yes — Send Automatically</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Next Invoice Date</label>
          <input type="date" name="next_invoice_date" class="form-input" value="{{ schedule.next_invoice_date|date:'Y-m-d'|default:'' }}">
        </div>
        <div class="form-group">
          <label class="form-label">End Date (optional)</label>
          <input type="date" name="end_date" class="form-input" value="{{ schedule.end_date|date:'Y-m-d'|default:'' }}">
        </div>
      </div>
    </div>

    <div class="card" style="padding:24px;margin-bottom:24px">
      <h2 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin:0 0 16px">Notes</h2>
      <textarea name="client_notes" class="form-textarea" rows="3">{{ schedule.client_notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:8px">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'invoices:recurring_detail' schedule.id %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
