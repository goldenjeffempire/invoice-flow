{% extends "base/layout_app.html" %}
{% block title %}New Recurring Schedule — InvoiceFlow{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'invoices:schedule_list' %}" class="w-8 h-8 rounded-lg flex items-center justify-center border border-slate-200 dark:border-slate-700 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <h1 class="text-xl font-bold text-slate-900 dark:text-white tracking-tight">New Recurring Schedule</h1>
  </div>

  <form method="post" action="{% url 'invoices:schedule_create' %}">
    {% csrf_token %}
    <div class="card p-6 mb-4 space-y-4">
      <h2 class="text-sm font-bold text-slate-800 dark:text-slate-200">Schedule Configuration</h2>
      <div>
        <label class="lbl">Description <span class="text-rose-500">*</span></label>
        <input type="text" name="description" required placeholder="Monthly retainer, Weekly consulting, etc." class="fi text-sm">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="lbl">Client <span class="text-rose-500">*</span></label>
          <select name="client_id" required class="fi text-sm">
            <option value="">Select client…</option>
            {% for client in clients %}<option value="{{ client.id }}">{{ client.name }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="lbl">Amount <span class="text-rose-500">*</span></label>
          <input type="number" name="amount" required min="0.01" step="any" placeholder="0.00" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">Currency</label>
          <select name="currency" class="fi text-sm">
            <option value="NGN">₦ NGN</option>
            <option value="USD">$ USD</option>
            <option value="EUR">€ EUR</option>
            <option value="GBP">£ GBP</option>
          </select>
        </div>
        <div>
          <label class="lbl">Interval Value <span class="text-rose-500">*</span></label>
          <input type="number" name="interval_value" required min="1" value="1" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">Interval Type <span class="text-rose-500">*</span></label>
          <select name="interval_type" required class="fi text-sm">
            {% if interval_choices %}
              {% for value, label in interval_choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
            {% else %}
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
              <option value="quarterly">Quarterly</option>
              <option value="annually">Annually</option>
              <option value="daily">Daily</option>
            {% endif %}
          </select>
        </div>
        <div>
          <label class="lbl">Start Date <span class="text-rose-500">*</span></label>
          <input type="date" name="start_date" required value="{{ today|date:'Y-m-d' }}" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">End Date (optional)</label>
          <input type="date" name="end_date" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">Due Days After Issue</label>
          <input type="number" name="due_days" min="0" max="365" value="30" class="fi text-sm">
        </div>
        <div>
          <label class="lbl">Tax Rate (%)</label>
          <input type="number" name="tax_rate" min="0" max="100" step="any" value="0" class="fi text-sm">
        </div>
      </div>
      <div>
        <label class="lbl">Notes</label>
        <textarea name="notes" rows="3" placeholder="Any notes for the recurring invoice…" class="fi text-sm"></textarea>
      </div>
      <div class="flex items-center gap-2">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="auto_send" value="true" checked class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
          <span class="text-sm text-slate-600 dark:text-slate-400">Automatically send invoice to client when generated</span>
        </label>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3">
      <a href="{% url 'invoices:schedule_list' %}" class="px-4 py-2 text-sm text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-colors">Cancel</a>
      <button type="submit" class="px-6 py-2.5 bg-violet-600 hover:bg-violet-700 text-white text-sm font-bold rounded-xl transition-colors shadow-sm shadow-violet-600/20">
        Create Schedule
      </button>
    </div>
  </form>
</div>
{% endblock %}
