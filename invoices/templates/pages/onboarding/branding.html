{% extends "pages/onboarding/base_onboarding.html" %}

{% block onboarding_step_content %}
<h2 class="text-2xl font-bold text-slate-900 mb-6">Branding & Style</h2>
<p class="text-slate-600 mb-8">Personalize your invoices to match your brand identity.</p>

<form action="{% url 'invoices:onboarding_step' 3 %}" method="POST" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}
    
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Company Logo</label>
        <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-xl hover:border-indigo-400 transition-colors">
            <div class="space-y-1 text-center">
                <svg class="mx-auto h-12 w-12 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <div class="flex text-sm text-slate-600">
                    <label for="company_logo" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none">
                        <span>Upload a file</span>
                        <input id="company_logo" name="company_logo" type="file" class="sr-only">
                    </label>
                    <p class="pl-1">or drag and drop</p>
                </div>
                <p class="text-xs text-slate-500">PNG, JPG, GIF up to 2MB</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Primary Brand Color</label>
            <div class="flex items-center space-x-3">
                <input type="color" name="primary_color" value="{{ user.profile.primary_color|default:'#6366f1' }}" class="h-10 w-20 rounded border border-slate-200 cursor-pointer">
                <span class="text-sm text-slate-500">Select your main brand color</span>
            </div>
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Invoice Template Style</label>
            <select name="invoice_style" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 outline-none">
                <option value="modern">Modern Professional</option>
                <option value="classic">Classic Business</option>
                <option value="minimal">Minimalist</option>
                <option value="creative">Creative / Bold</option>
            </select>
        </div>
    </div>

    <div class="pt-6 flex space-x-4">
        <a href="{% url 'invoices:onboarding_step' 2 %}" class="flex-1 text-center py-4 border border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-50 transition-all">Back</a>
        <button type="submit" class="flex-[2] bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">Continue</button>
    </div>
</form>
{% endblock %}
