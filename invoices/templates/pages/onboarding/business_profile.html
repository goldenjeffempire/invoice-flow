{% extends "pages/onboarding/base_onboarding.html" %}

{% block onboarding_step_content %}
<h2 class="text-2xl font-bold text-slate-900 mb-6">Business Profile</h2>
<p class="text-slate-600 mb-8">Tell us about your company. This information will appear on your invoices.</p>

<form action="{% url 'invoices:onboarding_step' 2 %}" method="POST" class="space-y-6">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Company Name</label>
            <input type="text" name="company_name" value="{{ user.profile.company_name }}" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Business Type</label>
            <select name="business_type" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
                <option value="freelance">Freelance / Solo</option>
                <option value="agency">Agency</option>
                <option value="startup">Startup</option>
                <option value="enterprise">Enterprise</option>
            </select>
        </div>
    </div>
    
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Business Email</label>
        <input type="email" name="business_email" value="{{ user.profile.business_email|default:user.email }}" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
    </div>
    
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Phone Number</label>
        <input type="text" name="business_phone" value="{{ user.profile.business_phone }}" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
    </div>
    
    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Business Address</label>
        <textarea name="business_address" rows="3" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all">{{ user.profile.business_address }}</textarea>
    </div>
    
    <div class="pt-6 flex space-x-4">
        <a href="{% url 'invoices:onboarding_step' 1 %}" class="flex-1 text-center py-4 border border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-50 transition-all">Back</a>
        <button type="submit" class="flex-[2] bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg">Continue</button>
    </div>
</form>
{% endblock %}
