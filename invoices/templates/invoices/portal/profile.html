{% extends "base/layout.html" %}
{% block title %}Update Billing - Client Portal{% endblock %}
{% block content %}
<div class="min-h-screen bg-slate-50 py-8">
    <div class="max-w-2xl mx-auto px-4">
        <div class="mb-6">
            <a href="{% url 'invoices:portal_dashboard' %}" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-slate-700">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back to Dashboard
            </a>
        </div>

        <div class="bg-white shadow rounded-2xl border border-slate-200 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-200">
                <h1 class="text-xl font-bold text-slate-900">Update Billing Details</h1>
                <p class="text-slate-500 text-sm mt-1">This information will be used for future invoices.</p>
            </div>
            <form method="POST" class="p-8 space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Business/Full Name</label>
                    <input type="text" name="name" value="{{ client.name }}" class="w-full rounded-lg border-slate-300 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Phone Number</label>
                    <input type="text" name="phone" value="{{ client.phone }}" class="w-full rounded-lg border-slate-300 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Billing Address</label>
                    <textarea name="billing_address" rows="4" class="w-full rounded-lg border-slate-300 focus:ring-indigo-500 focus:border-indigo-500">{{ client.billing_address }}</textarea>
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
