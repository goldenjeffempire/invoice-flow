{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — InvoiceFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-page); font-family: 'Inter', sans-serif; }
    .portal-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-lg); }
    .portal-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .portal-logo svg { width: 32px; height: 32px; background: var(--brand-600); border-radius: 8px; padding: 6px; }
  </style>
</head>
<body>
  <div class="portal-card">
    <div class="portal-logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 12h6m-6 4h6M7 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8l-5-4H7z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 4v4h4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="font-size: 20px; font-weight: 800; letter-spacing: -.5px;">InvoiceFlow</span>
    </div>

    <h1 style="font-size: 22px; font-weight: 800; text-align: center; margin: 0 0 6px;">Client Portal</h1>
    <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin: 0 0 28px;">Enter your email to receive a secure sign-in link.</p>

    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}" style="margin-bottom: 16px; padding: 12px 16px; border-radius: 10px; font-size: 13.5px;
      {% if 'success' in message.tags %}background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0;
      {% elif 'error' in message.tags %}background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
      {% else %}background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe;{% endif %}">
      {{ message }}
    </div>
    {% endfor %}

    <form method="post" action="{% url 'invoices:portal_login' %}">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom: 20px;">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">
        Send Secure Link
      </button>
    </form>

    <p style="text-align: center; font-size: 12.5px; color: var(--text-muted); margin-top: 20px;">
      We'll send a one-time sign-in link to your inbox. No password required.
    </p>
  </div>
</body>
</html>
